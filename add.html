<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новая запись</title>
<style>
:root {
  --bg-root: #06091a;
  --bg-primary: #0B132B;
  --bg-card: #131e3a;
  --text-white: #FFFFFF;
  --text-muted: #A0AEC0;
  --accent-gold: #D4AF37;
  --accent-green: #48BB78;
  --nav-bg: #0d1830;
  --border: rgba(255,255,255,0.07);
  --input-bg: #0f1a30;
  --shadow: 0 4px 24px rgba(0,0,0,0.45);
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg-root);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow-x: hidden;
}
.phone {
  width: 100%;
  max-width: 400px;
  min-height: 100vh;
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
}
.header {
  padding: 52px 20px 18px;
  background: linear-gradient(180deg, #0d1830 0%, var(--bg-primary) 100%);
  display: flex;
  align-items: center;
  gap: 14px;
}
.back-btn {
  width: 42px;
  height: 42px;
  border-radius: 13px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 19px;
  color: var(--text-white);
  flex-shrink: 0;
  box-shadow: var(--shadow);
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-white);
}
.form-body {
  flex: 1;
  padding: 16px 16px 180px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.9px;
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  min-height: 52px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0 16px;
  font-size: 15px;
  color: var(--text-white);
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
  -webkit-appearance: none;
}
.form-input:focus {
  border-color: rgba(212,175,55,0.45);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
}
.form-input::placeholder { color: rgba(160,174,192,0.4); }
.form-input[type="date"]::-webkit-calendar-picker-indicator,
.form-input[type="time"]::-webkit-calendar-picker-indicator {
  filter: invert(0.6);
  cursor: pointer;
}
.datetime-row { display: flex; gap: 10px; }
.datetime-row .form-input { flex: 1; }
.duration-row { display: flex; gap: 8px; }
.dur-btn {
  flex: 1;
  min-height: 52px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 13px;
  color: var(--text-muted);
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.18s;
}
.dur-btn.active {
  background: rgba(212,175,55,0.12);
  border-color: rgba(212,175,55,0.4);
  color: var(--accent-gold);
  box-shadow: 0 0 0 2px rgba(212,175,55,0.1);
}
.form-textarea {
  width: 100%;
  min-height: 96px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 15px;
  color: var(--text-white);
  outline: none;
  font-family: inherit;
  resize: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  line-height: 1.5;
}
.form-textarea:focus {
  border-color: rgba(212,175,55,0.45);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
}
.form-textarea::placeholder { color: rgba(160,174,192,0.4); }
.phone-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  padding-left: 4px;
}
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 400px;
  background: var(--nav-bg);
  border-top: 1px solid var(--border);
  padding: 14px 16px 0;
  z-index: 100;
}
.btn-save {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 54px;
  background: linear-gradient(135deg, #c9a227 0%, #f0cc55 100%);
  border-radius: 14px;
  color: #0B132B;
  font-size: 15px;
  font-weight: 800;
  text-decoration: none;
  letter-spacing: 0.8px;
  box-shadow: 0 4px 20px rgba(212,175,55,0.32);
  margin-bottom: 8px;
}
.btn-cancel {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  margin-bottom: 2px;
}
.nav {
  display: flex;
  padding: 6px 0 22px;
  border-top: 1px solid var(--border);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: 48px;
  text-decoration: none;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
}
.nav-item.active { color: var(--accent-gold); }
.nav-item.nav-add { color: var(--accent-green); }
.nav-icon { font-size: 20px; line-height: 1; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <a href="index.html" class="back-btn">←</a>
    <h1>Новая запись</h1>
  </div>

  <div class="form-body">
    <div class="form-group">
      <label class="form-label">Имя клиента</label>
      <input type="text" class="form-input" placeholder="Иван Иванов">
    </div>

    <div class="form-group">
      <label class="form-label">Телефон</label>
      <input type="tel" class="form-input" placeholder="+7 (999) 000-00-00">
      <p class="phone-hint">Для отправки напоминания</p>
    </div>

    <div class="form-group">
      <label class="form-label">Дата и время</label>
      <div class="datetime-row">
        <input type="date" class="form-input" value="2025-10-15">
        <input type="time" class="form-input" value="09:00">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Длительность сеанса</label>
      <div class="duration-row">
        <span class="dur-btn">45м</span>
        <span class="dur-btn active">60м</span>
        <span class="dur-btn">90м</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Жалоба / Заметка</label>
      <textarea class="form-textarea" placeholder="Боль в пояснице, шейный отдел, головные боли..."></textarea>
    </div>
  </div>

  <div class="bottom-bar">
    <a href="index.html" class="btn-save">СОХРАНИТЬ ЗАПИСЬ</a>
    <a href="index.html" class="btn-cancel">Отмена</a>
    <nav class="nav">
      <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span>
        <span>Расписание</span>
      </a>
      <a href="add.html" class="nav-item nav-add active" style="color:var(--accent-gold)">
        <span class="nav-icon">➕</span>
        <span>Добавить</span>
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span>Настройки</span>
      </a>
    </nav>
  </div>
</div>
</body>
</html>
